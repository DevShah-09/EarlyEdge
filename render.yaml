services:
  # --- Backend Service (FastAPI) ---
  - type: web
    name: earlyedge-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python run_api.py
    plan: free # Change to starter if you need more RAM for ML training
    envVars:
      - key: PORT
        value: 8000
      - key: RENDER
        value: "true"
      - key: ALLOW_ALL_CORS
        value: "true" # Simplified for first deployment
      - key: MODEL_DIR
        value: "./ml/saved_models"
      # You must add SUPABASE_URL and SUPABASE_KEY in the Render dashboard

  # --- Frontend Service (Static Site) ---
  - type: web
    name: earlyedge-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://earlyedge-backend-bq6m.onrender.com/ # UPDATE THIS after first backend deploy
